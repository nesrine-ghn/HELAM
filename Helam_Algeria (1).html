<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>HELAM</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    margin:0;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    background:#fff;
    color:#111;
    line-height: 1.4;
}

/* NAVBAR */
nav {
    display:flex;
    justify-content:space-between;
    align-items: center;
    padding: 18px 40px;
    border-bottom: 1px solid rgba(0,0,0,0.05);
    background: rgba(255,255,255,0.96);
    backdrop-filter: blur(2px);
    position: sticky;
    top: 0;
    z-index: 100;
}

nav h1 {
    letter-spacing: 6px;
    font-weight: 350;
    font-size: 1.7rem;
    color: #1e2a2f;
}

nav a {
    margin-left: 28px;
    text-decoration: none;
    color: #1e2a2f;
    cursor: pointer;
    font-weight: 500;
    transition: 0.2s;
    font-size: 1rem;
    border-bottom: 1px solid transparent;
}

nav a:hover {
    color: #c9a96e;
    border-bottom-color: #c9a96e;
}

/* HERO PLEIN ÉCRAN - IMAGE GRANDE ET COUVRE TOUT L'ÉCRAN */
.hero {
    height: 100vh;
    width: 100%;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: white;
    overflow: hidden;
    animation: fadeIn 1.2s ease-out;
}

/* Image de fond qui remplit tout l'écran sans déformation */
.hero-bg {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    z-index: 0;
}

/* Overlay subtil pour lisibilité du texte */
.hero::after {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.3);
    z-index: 1;
}

.hero-content {
    position: relative;
    z-index: 2;
    max-width: 90%;
    padding: 1rem;
}

.hero h2 {
    font-size: clamp(2.2rem, 8vw, 4.5rem);
    font-weight: 350;
    letter-spacing: 8px;
    text-shadow: 0 2px 15px rgba(0,0,0,0.3);
    margin-bottom: 1rem;
}

.hero p {
    font-size: clamp(1rem, 4vw, 1.4rem);
    letter-spacing: 2px;
    font-weight: 300;
    opacity: 0.9;
}

@keyframes fadeIn {
    from {opacity:0; transform: scale(1.02);}
    to {opacity:1; transform: scale(1);}
}

/* SECTIONS GÉNÉRALES */
.section {
    display: none;
    padding: 60px 30px;
    background: #ffffff;
}

.active {
    display: block !important;
}

/* BOUTIQUE : GRILLE PRODUITS (moderne & aérée) */
.container {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
    gap: 40px;
    max-width: 1280px;
    margin: 0 auto 50px auto;
}

.product {
    background: #fefefe;
    border-radius: 28px;
    overflow: hidden;
    box-shadow: 0 12px 26px rgba(0, 0, 0, 0.05);
    transition: all 0.3s ease;
    text-align: center;
    padding-bottom: 22px;
    border: 1px solid #f0ede8;
}

.product:hover {
    transform: translateY(-8px);
    box-shadow: 0 20px 30px rgba(0, 0, 0, 0.1);
}

.product img {
    width: 100%;
    height: 300px;
    object-fit: cover;
    display: block;
    transition: transform 0.4s ease;
}

.product:hover img {
    transform: scale(1.02);
}

.product h3 {
    margin: 20px 0 8px;
    font-size: 1.5rem;
    font-weight: 500;
    letter-spacing: -0.3px;
    color: #1f2c30;
}

.product p {
    font-size: 1.3rem;
    color: #c9a96e;
    font-weight: 600;
    margin-bottom: 18px;
}

.product button {
    background: #c9a96e;
    border: none;
    padding: 12px 28px;
    color: white;
    cursor: pointer;
    border-radius: 40px;
    font-size: 0.95rem;
    font-weight: 500;
    transition: 0.2s;
    box-shadow: 0 2px 5px rgba(0,0,0,0.05);
}

.product button:hover {
    background: #b48b4a;
    transform: scale(0.97);
}

/* FORMULAIRE DE COMMANDE */
form {
    max-width: 580px;
    margin: 30px auto 0 auto;
    background: #fbf9f6;
    padding: 38px 32px;
    border-radius: 40px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.03);
    border: 1px solid #f0e5d8;
}

form h2 {
    text-align: center;
    margin-bottom: 28px;
    font-weight: 450;
    color: #2c3e2f;
    letter-spacing: -0.2px;
}

input, textarea {
    width: 100%;
    margin: 12px 0;
    padding: 14px 18px;
    border: 1px solid #e2d9cf;
    border-radius: 60px;
    font-family: inherit;
    font-size: 1rem;
    background: white;
    transition: 0.2s;
}

textarea {
    border-radius: 28px;
    resize: vertical;
}

input:focus, textarea:focus {
    outline: none;
    border-color: #c9a96e;
    box-shadow: 0 0 0 2px rgba(201,169,110,0.2);
}

form button[type="submit"] {
    background: #1e2a2f;
    border-radius: 60px;
    padding: 14px;
    width: 100%;
    font-size: 1.1rem;
    margin-top: 18px;
    font-weight: 500;
    background: #c9a96e;
    color: white;
}

form button[type="submit"]:hover {
    background: #b18947;
}

/* ADMIN TABLEAU */
#admin {
    max-width: 1300px;
    margin: 0 auto;
}

#admin h2 {
    font-size: 2rem;
    font-weight: 400;
    border-left: 5px solid #c9a96e;
    padding-left: 20px;
    margin-bottom: 35px;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: white;
    border-radius: 28px;
    overflow: hidden;
    box-shadow: 0 6px 14px rgba(0,0,0,0.02);
}

th {
    background: #f5efe7;
    padding: 15px 10px;
    font-weight: 600;
    color: #2c3e2f;
}

td, th {
    border-bottom: 1px solid #ede5db;
    padding: 14px 8px;
    text-align: center;
}

.admin-actions button {
    margin: 0 6px;
    padding: 6px 14px;
    font-size: 0.75rem;
    border-radius: 50px;
    background: #e9e0d5;
    color: #2d3a2e;
    font-weight: 500;
}

.admin-actions button:hover {
    background: #c9a96e;
    color: white;
}

/* Responsive */
@media (max-width: 700px) {
    nav {
        padding: 14px 20px;
    }
    nav h1 {
        font-size: 1.3rem;
        letter-spacing: 4px;
    }
    nav a {
        margin-left: 16px;
        font-size: 0.85rem;
    }
    .section {
        padding: 40px 20px;
    }
    .container {
        gap: 24px;
    }
    .product img {
        height: 240px;
    }
    form {
        padding: 28px 18px;
    }
}
</style>
</head>
<body>

<!-- NAVIGATION -->
<nav>
    <h1>HELAM</h1>
    <div>
        <a onclick="show('home')">Accueil</a>
        <a onclick="show('shop')">Boutique</a>
        <a onclick="login()">Admin</a>
    </div>
</nav>

<!-- ACCUEIL : IMAGE PLEIN ÉCRAN (grande et parfaitement couvrante) -->
<div id="home" class="hero active">
    <!-- Balise IMG qui prend tout l'écran sans déformation -->
    <img class="hero-bg" src="bckground.jfif" alt="Collection HELAM" onerror="this.onerror=null; this.src='https://placehold.co/1920x1080?text=HELAM+Collection'">
    <div class="hero-content">
        <h2>NOUVELLE COLLECTION 2026</h2>
        <p>Élégance & confort au bord de l'eau</p>
    </div>
</div>

<!-- BOUTIQUE (PRODUITS + FORMULAIRE) -->
<div id="shop" class="section">
    <div class="container" id="products"></div>
    
    <form id="orderForm">
        <h2>✨ Passer commande</h2>
        <input type="text" placeholder="Nom complet" id="name" required>
        <input type="tel" placeholder="Téléphone" id="phone" required>
        <input type="text" placeholder="Produit souhaité" id="productInput" required>
	<input type="text" placeholder="Taille souhaité" required>
        <textarea placeholder="Adresse de livraison" id="address" rows="3"></textarea>
        <button type="submit">Valider ma commande</button>
    </form>
</div>

<!-- PANEL ADMIN (commandes) -->
<div id="admin" class="section">
    <h2>📋 Gestion des commandes</h2>
    <div style="overflow-x: auto;">
        <table>
            <thead>
                <tr><th>Nom</th><th>Téléphone</th><th>Produit</th><th>Adresse</th><th>Statut</th><th>Actions</th></tr>
            </thead>
            <tbody id="orders"></tbody>
        </table>
    </div>
</div>

<script>
// ----------------------------- CONFIGURATION -------------------------------
// Remplace par l'URL de ton script Google Apps Script (Web App) si besoin
const API_URL = "TON_SCRIPT_GOOGLE"; 

// ---------- CATALOGUE PRODUITS (images et prix) ----------
const products = [
    {name:"Burkini Élégant", price:"6200 DZD", img:"burkini.jfif"},
    {name:"Maillot Une Pièce", price:"4500 DZD", img:"une-piece.jfif"},
    {name:"Maillot Robe", price:"5400 DZD", img:"robe.jfif"},
    {name:"Paréo", price:"1200 DZD", img:"pareo.jfif"},
    {name:"Tankini", price:"4700 DZD", img:"tankini.jfif"}
];

// Affichage dynamique de la boutique (grille responsive)
const container = document.getElementById("products");
if(container) {
    products.forEach(p => {
        const productDiv = document.createElement("div");
        productDiv.className = "product";
        productDiv.innerHTML = `
            <img src="${p.img}" alt="${p.name}" loading="lazy" onerror="this.src='https://placehold.co/400x500?text=Photo+disponible'">
            <h3>${p.name}</h3>
            <p>${p.price}</p>
            <button onclick="selectProduct('${p.name.replace(/'/g, "\\'")}')">Commander</button>
        `;
        container.appendChild(productDiv);
    });
}

// Pré-remplir le champ produit et basculer vers la boutique + scroll fluide
function selectProduct(productName) {
    const productInput = document.getElementById("productInput");
    if(productInput) productInput.value = productName;
    show('shop');
    // défilement jusqu'au formulaire
    const formElement = document.getElementById("orderForm");
    if(formElement) {
        setTimeout(() => {
            formElement.scrollIntoView({ behavior: "smooth", block: "center" });
        }, 100);
    }
}

// ---------- NAVIGATION (afficher accueil / boutique / admin) ----------
function show(page) {
    // Home = hero, les autres = sections
    const homeDiv = document.getElementById("home");
    const shopDiv = document.getElementById("shop");
    const adminDiv = document.getElementById("admin");
    
    // Retirer active de tout
    if(homeDiv) homeDiv.classList.remove("active");
    if(shopDiv) shopDiv.classList.remove("active");
    if(adminDiv) adminDiv.classList.remove("active");
    
    if(page === "home") {
        if(homeDiv) homeDiv.classList.add("active");
    } else if(page === "shop") {
        if(shopDiv) shopDiv.classList.add("active");
    } else if(page === "admin") {
        if(adminDiv) adminDiv.classList.add("active");
    }
}

// ---------- GESTION COMMANDE (envoi vers Google Sheets si API configurée) ----------
const orderForm = document.getElementById("orderForm");
if(orderForm) {
    orderForm.addEventListener("submit", function(e) {
        e.preventDefault();
        const name = document.getElementById("name").value.trim();
        const phone = document.getElementById("phone").value.trim();
        const product = document.getElementById("productInput").value.trim();
        const address = document.getElementById("address").value.trim();
        
        if(!name || !phone || !product) {
            alert("Veuillez remplir au moins le nom, téléphone et produit.");
            return;
        }
        
        const orderData = { name, phone, product, address, status: "En attente" };
        
        // Si l'URL API a été configurée (différente du placeholder), on envoie
        if(API_URL && API_URL !== "TON_SCRIPT_GOOGLE") {
            fetch(API_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(orderData)
            }).catch(err => console.warn("Erreur envoi:", err));
            alert("✅ Commande envoyée ! Nous vous contacterons rapidement.");
        } else {
            // Mode démo / local : on stocke dans localStorage
            let localOrders = JSON.parse(localStorage.getItem("helam_orders") || "[]");
            const newOrder = { ...orderData, id: Date.now(), date: new Date().toLocaleString() };
            localOrders.push(newOrder);
            localStorage.setItem("helam_orders", JSON.stringify(localOrders));
            alert("📦 Commande enregistrée localement (mode démo). Admin pourra la visualiser.");
        }
        
        orderForm.reset();
        if(document.getElementById("admin").classList.contains("active")) {
            loadOrders();
        }
    });
}

// -------------------- PARTIE ADMIN --------------------
function login() {
    let pass = prompt("🔐 Mot de passe administrateur :");
    if(pass === "helam2026") {
        show("admin");
        loadOrders();
    } else if(pass !== null) {
        alert("Mot de passe incorrect. Accès refusé.");
    }
}

function loadOrders() {
    const tbody = document.getElementById("orders");
    if(!tbody) return;
    
    if(API_URL && API_URL !== "TON_SCRIPT_GOOGLE") {
        fetch(API_URL)
        .then(res => {
            if(!res.ok) throw new Error("HTTP error");
            return res.json();
        })
        .then(data => {
            if(!Array.isArray(data)) data = [];
            let html = "";
            data.slice(1).forEach((row, idx) => {
                if(row && row.length >= 4) {
                    html += `<tr>
                        <td>${escapeHtml(row[0] || '')}</td>
                        <td>${escapeHtml(row[1] || '')}</td>
                        <td>${escapeHtml(row[2] || '')}</td>
                        <td>${escapeHtml(row[3] || '')}</td>
                        <td>${escapeHtml(row[4] || 'En attente')}</td>
                        <td class="admin-actions">
                            <button onclick="updateOrderStatus(${idx+2}, 'Validée')">✔️ Validée</button>
                            <button onclick="updateOrderStatus(${idx+2}, 'Livrée')">🚚 Livrée</button>
                         </td>
                    </tr>`;
                }
            });
            tbody.innerHTML = html || `<tr><td colspan="6">Aucune commande trouvée</td></tr>`;
        })
        .catch(err => {
            console.error(err);
            tbody.innerHTML = `<tr><td colspan="6">⚠️ Erreur de chargement (API non configurée). Utilisez le mode démo local.</td></tr>`;
        });
    } else {
        const stored = localStorage.getItem("helam_orders");
        let orders = [];
        if(stored) {
            orders = JSON.parse(stored);
        }
        if(orders.length === 0) {
            orders.push({ name: "Sarah M.", phone: "0555 12 34 56", product: "Burkini Élégant", address: "Alger, 16000", status: "En attente", id: Date.now() });
            localStorage.setItem("helam_orders", JSON.stringify(orders));
        }
        
        let htmlRows = "";
        orders.forEach((order, index) => {
            htmlRows += `
            <tr>
                <td>${escapeHtml(order.name)}</td>
                <td>${escapeHtml(order.phone)}</td>
                <td>${escapeHtml(order.product)}</td>
                <td>${escapeHtml(order.address)}</td>
                <td id="status-${index}">${escapeHtml(order.status || "En attente")}</td>
                <td class="admin-actions">
                    <button onclick="localUpdateStatus(${index}, 'Validée')">✔️ Validée</button>
                    <button onclick="localUpdateStatus(${index}, 'Livrée')">🚚 Livrée</button>
                </td>
            </tr>`;
        });
        tbody.innerHTML = htmlRows || `<tr><td colspan="6">Aucune commande</td></tr>`;
    }
}

function updateOrderStatus(rowIndex, newStatus) {
    if(!API_URL || API_URL === "TON_SCRIPT_GOOGLE") {
        alert("Mode démo : utilisez les boutons en local (stockage navigateur)");
        return;
    }
    fetch(`${API_URL}?row=${rowIndex}&status=${encodeURIComponent(newStatus)}`)
    .then(() => {
        alert(`Statut mis à jour : ${newStatus}`);
        loadOrders();
    })
    .catch(err => alert("Erreur de mise à jour: " + err));
}

function localUpdateStatus(orderIndex, newStatus) {
    let orders = JSON.parse(localStorage.getItem("helam_orders") || "[]");
    if(orders[orderIndex]) {
        orders[orderIndex].status = newStatus;
        localStorage.setItem("helam_orders", JSON.stringify(orders));
        const statusCell = document.getElementById(`status-${orderIndex}`);
        if(statusCell) statusCell.innerText = newStatus;
        alert(`Statut changé en "${newStatus}" (mode local)`);
        loadOrders();
    } else {
        alert("Commande introuvable");
    }
}

function escapeHtml(str) {
    if(!str) return "";
    return str.replace(/[&<>]/g, function(m) {
        if(m === '&') return '&amp;';
        if(m === '<') return '&lt;';
        if(m === '>') return '&gt;';
        return m;
    });
}

window.addEventListener("DOMContentLoaded", () => {
    if(document.getElementById("admin").classList.contains("active")) loadOrders();
    
    const allImgs = document.querySelectorAll('.product img');
    allImgs.forEach(img => {
        img.addEventListener('error', function() {
            this.src = 'https://placehold.co/500x600?text=HELAM+Style';
            this.style.objectFit = 'cover';
        });
    });
});
</script>
</body>
</html>
